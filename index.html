<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wendy and the Tiny Helper</title>
<style>
:root {
  --cream: #fdf6e8;
  --paper: #fff9ec;
  --ink: #1c2a3a;
  --navy: #1f3a5f;
  --gold: #c8932a;
  --amber: #f6b94a;
  --amber-soft: #ffd87a;
  --teal: #7bc7c0;
  --teal-soft: #a8e0db;
  --blue: #5b8fc7;
  --green: #7fb069;
  --orange: #e8854a;
  --red: #c95252;
  --muted: #6a7280;
  --paper-shadow: rgba(60, 40, 20, 0.10);
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--cream);
  background-image:
    radial-gradient(circle at 25% 15%, rgba(255, 220, 150, 0.35), transparent 55%),
    radial-gradient(circle at 75% 85%, rgba(170, 210, 220, 0.28), transparent 55%);
  color: var(--ink);
  font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
  line-height: 1.55;
  min-height: 100vh;
}

body { display: flex; flex-direction: column; min-height: 100vh; }

header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 28px;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 13px;
  color: var(--muted);
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
header .brand { font-weight: 600; color: var(--navy); letter-spacing: 0.02em; }

main#book {
  flex: 1;
  display: flex; justify-content: center; align-items: center;
  padding: 24px;
}

.spread {
  width: 100%; max-width: 1100px;
  background: var(--paper);
  border-radius: 14px;
  box-shadow: 0 14px 50px var(--paper-shadow), 0 2px 6px var(--paper-shadow);
  padding: 56px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  align-items: center;
  min-height: 520px;
  animation: pageIn 0.45s ease-out;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.spread .text { font-size: 22px; line-height: 1.5; }
.spread .text p { margin: 0 0 0.55em 0; }
.spread .text .beat-num {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 11px; letter-spacing: 0.18em; color: var(--gold);
  font-weight: 700; display: block; margin-bottom: 18px; text-transform: uppercase;
}
.spread .text em { color: var(--navy); font-style: italic; }
.concept {
  display: inline-block; background: var(--navy); color: var(--paper);
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 13px; padding: 2px 9px; border-radius: 5px;
  margin: 0 2px; font-weight: 600; letter-spacing: 0.02em;
}

.spread .illus {
  display: flex; align-items: center; justify-content: center;
  min-height: 380px;
}
.spread .illus svg { max-width: 100%; height: auto; }

/* Cover */
.cover {
  width: 100%; max-width: 760px;
  background: var(--paper);
  border-radius: 14px;
  box-shadow: 0 14px 50px var(--paper-shadow);
  padding: 80px 48px 64px;
  text-align: center;
  animation: pageIn 0.5s ease-out;
}
.cover h1 {
  font-size: 52px; margin: 0 0 14px;
  color: var(--navy); letter-spacing: -0.015em; line-height: 1.1;
}
.cover .subtitle { font-size: 20px; color: var(--muted); font-style: italic; margin-bottom: 32px; }
.cover .start-hint {
  margin-top: 56px;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 13px; color: var(--muted); letter-spacing: 0.05em;
}

/* Chapter title */
.chapter-title {
  width: 100%; max-width: 720px;
  background: var(--paper);
  border-radius: 14px;
  box-shadow: 0 14px 50px var(--paper-shadow);
  padding: 100px 56px;
  text-align: center;
  animation: pageIn 0.5s ease-out;
}
.chapter-title .ch-num {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 13px; letter-spacing: 0.22em; color: var(--gold); font-weight: 700;
}
.chapter-title h2 { font-size: 44px; color: var(--navy); margin: 14px 0 28px; letter-spacing: -0.01em; }
.chapter-title .blurb { font-size: 19px; font-style: italic; color: var(--muted); max-width: 520px; margin: 0 auto; line-height: 1.55; }

/* Remember pages */
.remember {
  width: 100%; max-width: 640px;
  background: var(--paper);
  border-radius: 14px;
  box-shadow: 0 14px 50px var(--paper-shadow);
  padding: 72px 56px;
  text-align: center;
  animation: pageIn 0.5s ease-out;
}
.remember .label {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 12px; letter-spacing: 0.2em; color: var(--gold); font-weight: 700;
}
.remember h3 { color: var(--navy); font-size: 30px; margin: 12px 0 32px; }
.remember ol { text-align: left; max-width: 460px; margin: 0 auto; font-size: 19px; line-height: 1.7; padding-left: 24px; }
.remember ol li { margin-bottom: 14px; }
.remember .tag { color: var(--navy); font-weight: 600; }

footer {
  display: flex; gap: 12px; justify-content: center;
  padding: 18px 24px 32px;
}
footer button {
  background: var(--paper);
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 8px;
  padding: 10px 22px;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px; color: var(--navy);
  cursor: pointer; transition: all 0.15s;
  box-shadow: 0 1px 2px var(--paper-shadow);
}
footer button:hover:not(:disabled) {
  background: var(--navy); color: var(--paper); transform: translateY(-1px);
}
footer button:disabled { opacity: 0.4; cursor: not-allowed; }

/* TOC */
.toc-modal {
  position: fixed; inset: 0; background: rgba(28, 42, 58, 0.55);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.toc-modal.open { display: flex; }
.toc-content {
  background: var(--paper); border-radius: 12px;
  padding: 32px; max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.toc-content h3 { margin-top: 0; color: var(--navy); }
.toc-content ul { list-style: none; padding: 0; margin: 0; }
.toc-content li {
  padding: 12px 14px; border-radius: 6px; cursor: pointer;
  font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px;
  display: flex; justify-content: space-between; align-items: center;
  border: 1px solid transparent;
}
.toc-content li:hover { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); }
.toc-content li .ch-tag { color: var(--gold); font-weight: 700; font-size: 10px; letter-spacing: 0.15em; }

@media (max-width: 800px) {
  .spread { grid-template-columns: 1fr; padding: 32px; gap: 24px; min-height: auto; }
  .spread .text { font-size: 18px; }
  .cover h1 { font-size: 36px; }
  .chapter-title { padding: 60px 32px; }
  .chapter-title h2 { font-size: 32px; }
}

/* ============ ANIMATIONS ============ */
@keyframes pulse-glow {
  0%, 100% { opacity: 0.45; transform: scale(1); }
  50%      { opacity: 0.85; transform: scale(1.1); }
}
.sprite-glow { animation: pulse-glow 2.6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
.float { animation: float 3.2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }

@keyframes blink {
  0%, 92%, 100% { transform: scaleY(1); }
  94%, 96%      { transform: scaleY(0.08); }
}
.eye { transform-origin: center; transform-box: fill-box; animation: blink 5.5s infinite; }

@keyframes pile-grow {
  from { transform: scaleY(0); }
  to   { transform: scaleY(1); }
}
.pile-bar { transform-origin: bottom center; transform-box: fill-box; animation: pile-grow 1.2s cubic-bezier(.4,.1,.4,1) forwards; }

@keyframes scale-in {
  from { opacity: 0; transform: scale(0.5); }
  to   { opacity: 1; transform: scale(1); }
}
.scale-in { animation: scale-in 0.7s ease-out backwards; transform-origin: center; transform-box: fill-box; }

@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.fade-in { animation: fade-in 0.8s ease-out backwards; }

@keyframes slide-up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.slide-up { animation: slide-up 0.7s ease-out backwards; }

@keyframes fence-drop {
  from { transform: translateY(-30px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.fence-drop { animation: fence-drop 0.6s ease-out backwards; }

@keyframes jitter {
  0%, 100% { transform: translate(0,0) rotate(0deg); }
  25%      { transform: translate(-2px, 1px) rotate(-2deg); }
  50%      { transform: translate(1px, -1px) rotate(1deg); }
  75%      { transform: translate(-1px, 2px) rotate(-1deg); }
}
.jitter { animation: jitter 0.5s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }

@keyframes flag-flash {
  0%, 100% { fill: var(--red); }
  50%      { fill: #ff8888; }
}
.flag-flash { animation: flag-flash 0.8s ease-in-out 2; }

@keyframes node-glow {
  0%, 100% { fill: var(--paper); }
  50%      { fill: var(--amber-soft); }
}
.node-active { animation: node-glow 1.5s ease-in-out infinite; animation-delay: var(--delay, 0s); }

@keyframes arrow-pulse {
  0%, 100% { opacity: 0.3; }
  50%      { opacity: 1; }
}
.arrow-pulse { animation: arrow-pulse 1.8s ease-in-out infinite; }
</style>
</head>
<body>

<header>
  <div class="brand">Wendy and the Tiny Helper</div>
  <div class="meta"><span id="page-num">1</span> / <span id="page-total">—</span></div>
</header>

<main id="book"></main>

<footer>
  <button id="prev">← Back</button>
  <button id="toc">Contents</button>
  <button id="next">Next →</button>
</footer>

<div class="toc-modal" id="toc-modal">
  <div class="toc-content">
    <h3>Contents</h3>
    <ul id="toc-list"></ul>
  </div>
</div>

<script>
/*
  NOTE ON SAFETY: All page content in this file is authored statically (no user
  input is ever rendered). DOM is built by calling insertAdjacentHTML with these
  trusted, hard-coded strings.
*/

/* ============================================================
   ILLUSTRATION COMPONENTS
   ============================================================ */

const SPRITE_COLORS = {
  amber:  { body:'#f6b94a', glow:'#ffd87a' },
  teal:   { body:'#7bc7c0', glow:'#a8e0db' },
  blue:   { body:'#5b8fc7', glow:'#9fc1e5' },
  green:  { body:'#7fb069', glow:'#b5d6a0' },
  orange: { body:'#e8854a', glow:'#ffb88a' },
  ghost:  { body:'#d4d4d4', glow:'#e8e8e8' }
};

function sprite({ cx=0, cy=0, size=80, color='amber', glow=true, float=true, mood='happy' } = {}) {
  const c = SPRITE_COLORS[color];
  const eyeY = -size * 0.05;
  const eyeR = size * 0.075;
  const mouth = mood === 'happy'
    ? `<path d="M ${-size*0.12} ${size*0.12} Q 0 ${size*0.22} ${size*0.12} ${size*0.12}" stroke="#1c2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`
    : mood === 'sad'
    ? `<path d="M ${-size*0.12} ${size*0.18} Q 0 ${size*0.08} ${size*0.12} ${size*0.18}" stroke="#1c2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`
    : mood === 'tired'
    ? `<line x1="${-size*0.1}" y1="${size*0.15}" x2="${size*0.1}" y2="${size*0.15}" stroke="#1c2a3a" stroke-width="2.5" stroke-linecap="round"/>`
    : '';
  return `
    <g transform="translate(${cx},${cy})" class="${float ? 'float' : ''}">
      ${glow ? `<circle r="${size*0.72}" fill="${c.glow}" opacity="0.45" class="sprite-glow"/>` : ''}
      <ellipse cx="0" cy="0" rx="${size*0.52}" ry="${size*0.46}" fill="${c.body}"/>
      <ellipse cx="${-size*0.18}" cy="${-size*0.18}" rx="${size*0.12}" ry="${size*0.06}" fill="white" opacity="0.5"/>
      <g class="eye"><circle cx="${-size*0.16}" cy="${eyeY}" r="${eyeR}" fill="#1c2a3a"/><circle cx="${-size*0.14}" cy="${eyeY-eyeR*0.3}" r="${eyeR*0.3}" fill="white"/></g>
      <g class="eye"><circle cx="${size*0.16}" cy="${eyeY}" r="${eyeR}" fill="#1c2a3a"/><circle cx="${size*0.18}" cy="${eyeY-eyeR*0.3}" r="${eyeR*0.3}" fill="white"/></g>
      ${mouth}
    </g>`;
}

function wendy({ cx=0, cy=0, scale=1, mood='neutral' } = {}) {
  return `
    <g transform="translate(${cx},${cy}) scale(${scale})">
      <rect x="-50" y="20" width="100" height="80" rx="6" fill="#8b6a4a" opacity="0.2"/>
      <path d="M -38 100 Q -38 40 0 40 Q 38 40 38 100 Z" fill="#3d5a80"/>
      <path d="M -14 40 L 0 55 L 14 40" fill="#fff9ec" stroke="#3d5a80" stroke-width="1"/>
      <ellipse cx="0" cy="15" rx="22" ry="25" fill="#e8c1a0"/>
      <path d="M -22 8 Q -24 -10 0 -12 Q 24 -10 22 8 Q 20 -2 12 -4 Q 0 -8 -12 -4 Q -20 -2 -22 8" fill="#3a2818"/>
      <path d="M -22 8 Q -28 18 -22 28 L -18 24" fill="#3a2818"/>
      <path d="M 22 8 Q 28 18 22 28 L 18 24" fill="#3a2818"/>
      <circle cx="-9" cy="17" r="6" fill="none" stroke="#1c2a3a" stroke-width="1.5"/>
      <circle cx="9" cy="17" r="6" fill="none" stroke="#1c2a3a" stroke-width="1.5"/>
      <line x1="-3" y1="17" x2="3" y2="17" stroke="#1c2a3a" stroke-width="1.5"/>
      ${mood==='happy' ? '<path d="M -5 27 Q 0 31 5 27" stroke="#1c2a3a" stroke-width="1.5" fill="none" stroke-linecap="round"/>' : ''}
      ${mood==='neutral' ? '<line x1="-4" y1="28" x2="4" y2="28" stroke="#1c2a3a" stroke-width="1.5" stroke-linecap="round"/>' : ''}
      ${mood==='tired' ? '<path d="M -5 30 Q 0 27 5 30" stroke="#1c2a3a" stroke-width="1.5" fill="none" stroke-linecap="round"/>' : ''}
    </g>`;
}

function paper({ x, y, w=50, h=64, rot=0, color='#fff9ec' } = {}) {
  return `
    <g transform="translate(${x},${y}) rotate(${rot})">
      <rect x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="2" fill="${color}" stroke="#c8932a" stroke-width="0.8" opacity="0.95"/>
      ${[0.25,0.4,0.55,0.7].map(f =>
        `<line x1="${-w/2+w*0.15}" y1="${-h/2+h*f}" x2="${w/2-w*0.15}" y2="${-h/2+h*f}" stroke="#c8932a" stroke-width="0.6" opacity="0.5"/>`
      ).join('')}
    </g>`;
}

const ILLUS = {

cover: () => `
  <svg viewBox="0 0 320 260" width="320">
    <defs>
      <radialGradient id="coverGlow"><stop offset="0%" stop-color="#ffd87a" stop-opacity="0.7"/><stop offset="100%" stop-color="#ffd87a" stop-opacity="0"/></radialGradient>
    </defs>
    <circle cx="160" cy="130" r="120" fill="url(#coverGlow)"/>
    ${sprite({ cx: 160, cy: 130, size: 110 })}
    ${paper({ x: 50, y: 70, w: 32, h: 40, rot: -18 })}
    ${paper({ x: 270, y: 80, w: 30, h: 38, rot: 22 })}
    ${paper({ x: 40, y: 200, w: 30, h: 38, rot: 12 })}
    ${paper({ x: 280, y: 200, w: 32, h: 40, rot: -10 })}
  </svg>`,

wendyDesk: () => `
  <svg viewBox="0 0 320 320">
    <rect x="20" y="240" width="280" height="14" fill="#8b6a4a"/>
    <rect x="30" y="254" width="6" height="50" fill="#8b6a4a"/>
    <rect x="284" y="254" width="6" height="50" fill="#8b6a4a"/>
    ${paper({ x: 90, y: 230, w: 40, h: 50, rot: -4 })}
    ${paper({ x: 95, y: 232, w: 40, h: 50, rot: 4 })}
    <rect x="200" y="216" width="32" height="28" rx="2" fill="#a85a3a"/>
    <path d="M 232 222 Q 244 226 232 238" fill="none" stroke="#a85a3a" stroke-width="3"/>
    <ellipse cx="216" cy="216" rx="16" ry="3" fill="#5d3520"/>
    ${wendy({ cx: 160, cy: 130, scale: 1.4, mood: 'neutral' })}
    <rect x="120" y="262" width="80" height="14" fill="#c8932a"/>
    <text x="160" y="273" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white" font-weight="600">GENERAL COUNSEL</text>
  </svg>`,

contractPile: () => {
  const stacks = [];
  for (let i = 0; i < 22; i++) {
    const y = 250 - i * 11;
    const offset = (i % 2 === 0) ? -4 : 4;
    const delay = i * 0.05;
    stacks.push(`<g class="pile-bar" style="animation-delay:${delay}s">${paper({ x: 200 + offset, y, w: 64, h: 14, rot: (i%3-1)*3 })}</g>`);
  }
  return `
  <svg viewBox="0 0 320 320">
    <line x1="0" y1="10" x2="320" y2="10" stroke="#1c2a3a" stroke-width="2" stroke-dasharray="4,3" opacity="0.3"/>
    <text x="280" y="22" font-family="sans-serif" font-size="9" fill="#6a7280">ceiling</text>
    <rect x="20" y="260" width="280" height="14" fill="#8b6a4a"/>
    ${stacks.join('')}
    ${wendy({ cx: 80, cy: 230, scale: 0.8, mood: 'tired' })}
    <g transform="translate(280,236)">
      <path d="M -8 24 L 8 24 L 6 4 L -6 4 Z" fill="#8b6a4a"/>
      <path d="M 0 4 Q -10 -8 -8 -16 M 0 4 Q 8 -10 12 -14 M 0 4 Q -2 -14 0 -22" stroke="#7fb069" stroke-width="3" fill="none" stroke-linecap="round" transform="rotate(-12)"/>
    </g>
  </svg>`;
},

agentAppears: () => `
  <svg viewBox="0 0 320 320">
    <rect x="20" y="240" width="280" height="14" fill="#8b6a4a"/>
    <rect x="120" y="180" width="44" height="64" rx="3" fill="#a85a3a"/>
    <path d="M 164 192 Q 184 200 164 224" fill="none" stroke="#a85a3a" stroke-width="4"/>
    <ellipse cx="142" cy="180" rx="22" ry="4" fill="#5d3520"/>
    <circle cx="220" cy="160" r="80" fill="#ffd87a" opacity="0.35" class="sprite-glow"/>
    <g class="scale-in" style="animation-delay:0.4s">
      ${sprite({ cx: 220, cy: 160, size: 75 })}
    </g>
    ${wendy({ cx: 70, cy: 180, scale: 1, mood: 'happy' })}
    <g class="fade-in" style="animation-delay:0.9s">
      <circle cx="170" cy="120" r="2.5" fill="#ffd87a"/>
      <circle cx="270" cy="130" r="2" fill="#ffd87a"/>
      <circle cx="260" cy="210" r="2.5" fill="#ffd87a"/>
      <circle cx="190" cy="220" r="1.5" fill="#ffd87a"/>
    </g>
  </svg>`,

programVsAgent: () => `
  <svg viewBox="0 0 360 280">
    <text x="80" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6a7280" letter-spacing="2">PROGRAM</text>
    <g class="jitter">
      <rect x="40" y="60" width="80" height="100" rx="4" fill="#9aa5b1" stroke="#1c2a3a" stroke-width="2"/>
      <rect x="55" y="80" width="50" height="6" rx="2" fill="#1c2a3a"/>
      <rect x="55" y="92" width="40" height="6" rx="2" fill="#1c2a3a"/>
      <rect x="55" y="104" width="50" height="6" rx="2" fill="#1c2a3a"/>
      <circle cx="80" cy="135" r="10" fill="#1c2a3a"/>
      <path d="M 80 130 L 80 135 L 84 138" stroke="white" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(80,200)">
      <circle r="14" fill="none" stroke="#9aa5b1" stroke-width="3"/>
      ${[0,45,90,135,180,225,270,315].map(a => `<rect x="-2" y="-20" width="4" height="6" fill="#9aa5b1" transform="rotate(${a})"/>`).join('')}
    </g>
    <text x="280" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c8932a" letter-spacing="2">AGENT</text>
    ${sprite({ cx: 280, cy: 110, size: 70 })}
    <g transform="translate(310,170)">
      <ellipse cx="0" cy="0" rx="40" ry="24" fill="white" stroke="#1c2a3a" stroke-width="1.5"/>
      <circle cx="-30" cy="14" r="5" fill="white" stroke="#1c2a3a" stroke-width="1.5"/>
      <circle cx="-38" cy="22" r="3" fill="white" stroke="#1c2a3a" stroke-width="1.5"/>
      <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#c8932a" font-weight="700">? → ✓</text>
    </g>
  </svg>`,

systemPrompt: () => `
  <svg viewBox="0 0 360 300">
    ${sprite({ cx: 100, cy: 180, size: 90 })}
    <g class="slide-up" style="animation-delay:0.2s">
      <rect x="150" y="40" width="200" height="140" rx="6" fill="#fff9ec" stroke="#c8932a" stroke-width="2"/>
      <text x="250" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" letter-spacing="2" fill="#c8932a" font-weight="700">JOB DESCRIPTION</text>
      <line x1="170" y1="72" x2="330" y2="72" stroke="#c8932a" stroke-width="0.5" opacity="0.5"/>
      <text x="170" y="98"  font-family="serif" font-size="13" fill="#1c2a3a">• Read every vendor contract.</text>
      <text x="170" y="124" font-family="serif" font-size="13" fill="#1c2a3a">• Find anything risky.</text>

/* ============================================================
   RENDERING + NAV
   (All HTML strings below are statically authored. No user input.)
   ============================================================ */

let current = 0;
const book = document.getElementById('book');

function buildHtml(p) {
  if (p.type === 'cover') {
    return `<div class="cover">
      <div class="cover-illus">${ILLUS.cover()}</div>
      <h1>Wendy and the Tiny Helper</h1>
      <div class="subtitle">A story about building an AI agent</div>
      <div class="start-hint">Click <strong>Next</strong> or press → to begin</div>
    </div>`;
  }
  if (p.type === 'chapter') {
    return `<div class="chapter-title">
      <div class="ch-num">Chapter ${p.n}</div>
      <h2>${p.title}</h2>
      <div class="blurb">${p.blurb}</div>
    </div>`;
  }
  if (p.type === 'spread') {
    return `<div class="spread">
      <div class="text">
        <span class="beat-num">Chapter ${p.ch} · ${p.beat}</span>
        ${p.text.map(t => `<p>${t}</p>`).join('')}
      </div>
      <div class="illus">${ILLUS[p.illus]()}</div>
    </div>`;
  }
  if (p.type === 'remember') {
    return `<div class="remember">
      <div class="label">END OF CHAPTER ${p.ch}</div>
      <h3>Three things to remember</h3>
      <ol>${p.items.map(i => `<li>${i}</li>`).join('')}</ol>
    </div>`;
  }
  if (p.type === 'end') {
    return `<div class="cover">
      <h1>The End</h1>
      <div class="subtitle">For now.</div>
      <div style="margin: 48px auto;">${ILLUS.teamPhoto()}</div>
      <div class="start-hint">More chapters coming soon — memory, human-in-the-loop, and knowing when <em>not</em> to use an agent.</div>
    </div>`;
  }
  return '';
}

function render() {
  const p = pages[current];
  book.replaceChildren();
  book.insertAdjacentHTML('beforeend', buildHtml(p));
  document.getElementById('page-num').textContent = current + 1;
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === pages.length - 1;
  window.scrollTo(0, 0);
}

function next() { if (current < pages.length - 1) { current++; render(); }}
function prev() { if (current > 0) { current--; render(); }}

document.getElementById('next').addEventListener('click', next);
document.getElementById('prev').addEventListener('click', prev);

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); prev(); }
  if (e.key === 'Escape') closeToc();
});

const tocModal = document.getElementById('toc-modal');
const tocList = document.getElementById('toc-list');

function buildToc() {
  const items = pages.map((p, i) => {
    let label = '', tag = '';
    if (p.type === 'cover') { label = 'Cover'; tag = ''; }
    else if (p.type === 'chapter') { label = p.title; tag = `CH ${p.n}`; }
    else if (p.type === 'spread') {
      const first = p.text[0].replace(/<[^>]+>/g,'');
      const snippet = first.length > 42 ? first.slice(0,42) + '…' : first;
      label = `Beat ${p.beat}: ${snippet}`;
      tag = `CH ${p.ch}`;
    }
    else if (p.type === 'remember') { label = 'Three things to remember'; tag = `CH ${p.ch}`; }
    else if (p.type === 'end') { label = 'The End'; tag = ''; }
    return `<li data-idx="${i}"><span>${label}</span><span class="ch-tag">${tag}</span></li>`;
  }).join('');
  tocList.replaceChildren();
  tocList.insertAdjacentHTML('beforeend', items);
  tocList.querySelectorAll('li').forEach(li => {
    li.addEventListener('click', () => {
      current = parseInt(li.dataset.idx);
      render();
      closeToc();
    });
  });
}
function openToc()  { tocModal.classList.add('open'); }
function closeToc() { tocModal.classList.remove('open'); }
document.getElementById('toc').addEventListener('click', openToc);
tocModal.addEventListener('click', e => { if (e.target === tocModal) closeToc(); });

document.getElementById('page-total').textContent = pages.length;
buildToc();
render();
</script>
